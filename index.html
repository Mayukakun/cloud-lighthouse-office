<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぽわ雲事務所 v1</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(#dff3f7, #f8f4df);
      color: #4f5f63;
      text-align: center;
    }

    .office {
      position: relative;
      max-width: 960px;
      min-height: 640px;
      margin: 30px auto;
      border-radius: 32px;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.9), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.8), transparent 20%),
        linear-gradient(#f7fbfb, #eef7f4);
      box-shadow: 0 12px 30px rgba(92, 120, 130, .18);
      overflow: hidden;
      border: 4px solid rgba(255,255,255,.8);
    }

    h1 {
      padding-top: 28px;
      font-size: 1.8rem;
      color: #5f8f98;
    }

    .room {
      position: relative;
      height: 470px;
    }

    .clickable {
      position: absolute;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease;
    }

    .clickable:hover {
      transform: translateY(-4px);
      filter: drop-shadow(0 6px 8px rgba(0,0,0,.12));
    }

    .window {
      left: 70px;
      top: 80px;
      width: 150px;
      height: 120px;
      border-radius: 28px;
      background: linear-gradient(#bfe6ee, #fff8d8);
      border: 6px solid #ffffff;
      box-shadow: inset 0 0 18px rgba(255,255,255,.9);
    }

    .window::after {
      content: "☁️";
      font-size: 2.4rem;
      position: absolute;
      left: 48px;
      top: 36px;
    }

    .bookshelf {
      right: 70px;
      top: 95px;
      width: 150px;
      height: 190px;
      border-radius: 18px;
      background: #d7b98b;
      box-shadow: inset 0 -8px 0 rgba(120,80,40,.15);
    }

    .bookshelf::before {
      content: "📚";
      font-size: 3.4rem;
      position: absolute;
      left: 45px;
      top: 55px;
    }

    .desk {
      left: 330px;
      top: 260px;
      width: 300px;
      height: 95px;
      border-radius: 24px 24px 12px 12px;
      background: #d1bf64;
      box-shadow: 0 10px 0 #b89f4d;
    }

    .gura {
      left: 405px;
      top: 145px;
      width: 150px;
      height: 135px;
      border-radius: 48% 48% 42% 42%;
      background: #82abb0;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.4rem;
    }

    .gura::after {
      content: "🕶️";
    }

    .lamp {
      left: 620px;
      top: 205px;
      font-size: 3rem;
    }

    .mug {
      left: 360px;
      top: 225px;
      font-size: 2.6rem;
    }

    .plant {
      right: 115px;
      top: 310px;
      font-size: 3.2rem;
    }

    .kohuang {
      left: 95px;
      bottom: 40px;
      width: 190px;
      height: 95px;
      border-radius: 28px;
      background: rgba(255, 250, 210, .95);
      border: 4px solid #fff;
      box-shadow: 0 8px 18px rgba(120,100,60,.14);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 2.5rem;
    }

    .kohuang::before {
      content: "🐥";
    }

    .kohuang::after {
      content: "受付";
      font-size: 1rem;
      color: #8f7c35;
      font-weight: bold;
    }

    .message-box {
      max-width: 760px;
      margin: 0 auto 28px;
      padding: 18px 22px;
      border-radius: 20px;
      background: rgba(255,255,255,.88);
      border: 2px dashed #d1bf64;
      color: #52686d;
      line-height: 1.8;
    }

    @media (max-width: 700px) {
      .office {
        margin: 12px;
        min-height: 760px;
      }

      .room {
        height: 600px;
      }

      .window {
        left: 24px;
        top: 80px;
        transform: scale(.85);
      }

      .bookshelf {
        right: 24px;
        top: 90px;
        transform: scale(.85);
      }

      .gura {
        left: 50%;
        top: 220px;
        transform: translateX(-50%);
      }

      .desk {
        left: 50%;
        top: 340px;
        transform: translateX(-50%);
        width: 260px;
      }

      .mug {
        left: 30%;
        top: 305px;
      }

      .lamp {
        right: 26%;
        left: auto;
        top: 285px;
      }

      .plant {
        right: 45px;
        top: 430px;
      }

      .kohuang {
        left: 30px;
        bottom: 45px;
      }
    }
  </style>
</head>
<body>

  <main class="office">
    <h1>☁️ ぽわ雲事務所 v1</h1>
    <p>気になるところをクリックしてみてね。</p>

    <section class="room">
      <div class="clickable window" data-message="窓の外には、今日のぽわ雲がゆっくり流れています。"></div>
      <div class="clickable bookshelf" data-message="本棚には、灯台活動とぽわ研究の記録がぎっしり並んでいます。"></div>
      <div class="clickable gura" data-message="幹部：おつぽわ。今日も構造を見ながら、ゆっくり進めよう。"></div>
      <div class="clickable lamp" data-message="ランプが、作業机の上をやさしく照らしています。">🛋️</div>
      <div class="clickable mug" data-message="マグカップには、ぽわ補給用のお茶が入っています。">☕️</div>
      <div class="clickable plant" data-message="植物は、事務所の空気を静かに整えています。">🪴</div>
      <div class="clickable kohuang" data-message="小黄受付：ぽわ雲事務所へようこそ。今日はどんな用件ぽわ？"></div>
      <div class="desk"></div>
    </section>

    <div class="message-box" id="message">
      ぽわ雲事務所へようこそ。幹部、小黄受付、窓、本棚、ランプ、マグカップ、植物をクリックできます。
    </div>
  </main>

  <script>
    const items = document.querySelectorAll('.clickable');
    const message = document.getElementById('message');

    items.forEach(item => {
      item.addEventListener('click', () => {
        message.textContent = item.dataset.message;
      });
    });
  </script>

</body>
</html>

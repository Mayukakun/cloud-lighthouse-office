<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぽわ雲事務所 v1.2</title>
  <style>
    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background: linear-gradient(#dff3f7, #f8f4df);
      color: #4f5f63;
      text-align: center;
    }

    .office {
      position: relative;
      max-width: 960px;
      min-height: 640px;
      margin: 30px auto;
      border-radius: 32px;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.9), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,.8), transparent 20%),
        linear-gradient(#faf9f5, #eef7f4);
      box-shadow: 0 12px 30px rgba(92, 120, 130, .18);
      overflow: hidden;
      border: 4px solid rgba(255,255,255,.8);
    }

    h1 {
      padding-top: 28px;
      font-size: 1.8rem;
      color: #5f8f98;
    }

    .room {
      position: relative;
      height: 470px;
    }

    .clickable {
      position: absolute;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease;
    }

    .clickable:hover {
      transform: translateY(-4px);
      filter: drop-shadow(0 6px 8px rgba(0,0,0,.12));
    }

    .window {
    position: absolute;
    left: 170px;
    top: 60px;
    width: 200px;
    height: auto;
    z-index: 1;
    background: transparent;
    border: none;
    box-shadow: none;
  }

  .window img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    pointer-events: none;
  }

    .bookshelf {
      right: 70px;
      top: 95px;
      width: 150px;
      height: 190px;
      border-radius: 18px;
      background: #d7b98b;
      box-shadow: inset 0 -8px 0 rgba(120,80,40,.15);
      }

    .bookshelf::before {
      content: "📚";
      font-size: 3.4rem;
      position: absolute;
      left: 45px;
      top: 55px;
      }

      .window--image::after {
      content: none;
      }

    .desk {
      position: absolute;
      left: 350px;
      top: 250px;
      width: 300px;
      height: 70px;
      border-radius: 16px 16px 12px 12px;
      background-image: url(images/wood-texture.jpg);
      box-shadow: 0 10px 0 #b89f4d;
      z-index: 1;
    }

    .gura {
      position: absolute;
      left: 380px;
      top: 120px;
      width: 230px;
      height: 170px;
      border-radius: 0;
      background: transparent;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.4rem;
      z-index: 2;
    }

    .gura img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .gura:not(.gura--image) {
      border-radius: 48% 48% 42% 42%;
      background: #82abb0;
    }

    .gura:not(.gura--image)::after {
      content: "🕶️";
    }

    .lamp {
      position: absolute;
      left: 570px;
      top: 195px;
      width: 62px;
      height: auto;
      z-index: 3;
    }

    .lamp img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      animation: lamp-flicker 3.8s ease-in-out infinite;
    }

    @keyframes lamp-flicker {
      0%, 100% {
        filter: brightness(1) drop-shadow(0 0 4px rgba(209, 191, 100, .35));
      }

      45% {
        filter: brightness(1.08) drop-shadow(0 0 8px rgba(209, 191, 100, .55));
      }

      60% {
        filter: brightness(.98) drop-shadow(0 0 5px rgba(209, 191, 100, .4));
      }

      75% {
        filter: brightness(1.12) drop-shadow(0 0 10px rgba(209, 191, 100, .6));
      }
    }

    .mug {
      position: absolute;
      left: 385px;
      top: 240px;
      width: 58px;
      height: auto;
      z-index: 4;
    }

    .mug img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .steam,
    .steam::before,
    .steam::after {
      position: absolute;
      content: "";
      width: 14px;
      height: 42px;
      border-radius: 50%;
      border-left: 4px solid rgba(255,255,255,0.72);
      border-top: 3px solid transparent;
      border-bottom: 3px solid transparent;
      filter: blur(.3px) drop-shadow(0 0 3px rgba(130, 171, 176, 1.45));
      pointer-events: none;
    }

    .steam {
      left: 25%;
      top: -40px;
      z-index: 6;
      animation: steam-up 3.6s ease-in-out infinite;
    }

    .steam::before {
      left: -8px;
      top: -6px;
      transform: rotate(-12deg);
      animation: steam-up 3.3s ease-in-out infinite .5s;
    }

    .steam::after {
      left: 7px;
      top: -10px;
      transform: rotate(10deg);
      animation: steam-up 3.8s ease-in-out infinite .2s;
    }

    @keyframes steam-up {
      0% {
        transform: translateY(8px) scale(.95);
        opacity: 0;
      }
      20% {
        opacity: .55;
      }
      70% {
        opacity: .22;
      }
      100% {
        transform: translateY(-10px) scale(1.05);
        opacity: 0;
      }
    }

    .plant {
      right: 115px;
      top: 310px;
      font-size: 3.2rem;
    }

    .kohuang {
      position: absolute;
      left: 95px;
      bottom: 40px;
      width: 230px;
      height: 100px;
      border-radius: 24px 24px 18px 18px;
      background: linear-gradient(#fff8c9, #fff4a8);
      border: 4px solid #fff;
      box-shadow:
        0 8px 18px rgba(120,100,60,.14),
        inset 0 -10px 0 rgba(209,191,100,.28);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 4;
    }

    .kohuang img {
      width: 100px;
      height: auto;
      object-fit: contain;
      pointer-events: none;
      transform: translateY(-50px);
    }

    .kohuang span {
      font-size: 1.05rem;
      color: #8f7c35;
      font-weight: bold;
      background: rgba(255,255,255,.68);
      padding: 5px 12px;
      border-radius: 999px;
      pointer-events: none;
    }

    .message-box {
      max-width: 760px;
      margin: 0 auto 28px;
      padding: 18px 22px;
      border-radius: 20px;
      background: rgba(255,255,255,.88);
      border: 2px dashed #d1bf64;
      color: #52686d;
      line-height: 1.8;
    }

    @media (max-width: 700px) {
      .office {
        margin: 12px;
        min-height: 760px;
      }

      .room {
        height: 600px;
      }

      .window {
        left: 24px;
        top: 80px;
        transform: scale(.85);
      }

      .bookshelf {
        right: 24px;
        top: 90px;
        transform: scale(.85);
      }

      .gura {
        left: 30%;
        top: 220px;
        /* transform: translateX(-50%); */
      }

      .desk {
        left: 50%;
        top: 340px;
        transform: translateX(-50%);
        width: 260px;
      }

      .mug {
        left: 30%;
        top: 305px;
      }

      .lamp {
        right: 26%;
        left: auto;
        top: 285px;
      }

      .plant {
        right: 45px;
        top: 430px;
      }

      .kohuang {
        left: 30px;
        bottom: 45px;
      }
    }
  </style>
</head>
<body>

  <main class="office">
    <h1>☁️ ぽわ雲事務所 v1</h1>
    <p>気になるところをクリックしてみてね。</p>

    <section class="room">
      <div class="clickable window window--image" data-message="窓の外には、今日のぽわ雲がゆっくり流れています。">
        <img src="images/powa-window.png" alt="ぽわ雲事務所の窓">
      </div>
      <div class="clickable bookshelf" data-message="本棚には、灯台活動とぽわ研究の記録がぎっしり並んでいます。"></div>
      <div class="clickable gura gura--image" data-message="幹部：おつぽわ。今日も構造を見ながら、ゆっくり進めよう。">
        <img src="images/gura-chair.png" alt="ぽわ雲事務所の幹部">
      </div>     
      <div class="clickable lamp lamp--image" data-message="ランプが、作業机の上をやさしく照らしています。">
        <img src="images/powa-lamp.png" alt="ぽわ雲事務所のランプ">
      </div>      
      <div class="clickable mug mug--image" data-message="マグカップには、ぽわ補給用のお茶が入っています。">
        <span class="steam"></span>
        <img src="images/gura-mug.png" alt="幹部専用のぽわ補給マグカップ">
      </div>      
      <div class="clickable plant" data-message="植物は、事務所の空気を静かに整えています。">🪴</div>
      <div class="clickable kohuang kohuang--image" data-message="小黄受付：ぽわ雲事務所へようこそ。今日はどんな用件ぽわ？">
        <img src="images/kohuang.png" alt="ぽわ雲事務所の小黄受付">
        <span>受付</span>
      </div>
      <div class="desk"></div>
    </section>

    <div class="message-box" id="message">
      ぽわ雲事務所へようこそ。幹部、小黄受付、窓、本棚、ランプ、マグカップ、植物をクリックできます。
    </div>
  </main>

  <script>
    const items = document.querySelectorAll('.clickable');
    const message = document.getElementById('message');

    items.forEach(item => {
      item.addEventListener('click', () => {
        message.textContent = item.dataset.message;
      });
    });
  </script>

</body>
</html>
